<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52718f" />
    </marker>
    <style>
      .bg { fill:#fbfcff; stroke:#d1dbe8; stroke-width:2; }
      .panel { fill:#ffffff; stroke:#8aa6c4; stroke-width:2; }
      .blue { fill:#edf5ff; stroke:#4c84bf; stroke-width:2; }
      .green { fill:#eef8ef; stroke:#5c9b62; stroke-width:2; }
      .orange { fill:#fff4e8; stroke:#c98639; stroke-width:2; }
      .red { fill:#fdeef1; stroke:#c05c75; stroke-width:2; }
      .axis { stroke:#34526e; stroke-width:3; }
      .grid { stroke:#d9e2ec; stroke-width:1.5; }
      .curve1 { fill:none; stroke:#4c84bf; stroke-width:5; stroke-linecap:round; stroke-linejoin:round; }
      .curve2 { fill:none; stroke:#d07a26; stroke-width:5; stroke-linecap:round; stroke-linejoin:round; }
      .arrow { fill:none; stroke:#52718f; stroke-width:4; marker-end:url(#arrow); }
      .title { font:700 28px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .label { font:700 20px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .body { font:17px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#29465d; }
      .small { font:15px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#49657d; }
      .num { font:700 16px 'Consolas','Microsoft YaHei','Segoe UI',Arial,sans-serif; fill:#29465d; }
    </style>
  </defs>

  <rect x="20" y="20" width="1160" height="610" rx="20" class="bg" />
  <text x="60" y="70" class="title">算法示意图 3：先把原始回波变成“能看结构”的图层</text>

  <rect x="65" y="105" width="390" height="285" rx="16" class="panel" />
  <text x="95" y="145" class="label">原始回波 P(R)</text>
  <text x="95" y="174" class="small">远处天然变暗，不能直接读成污染浓度</text>
  <line x1="115" y1="340" x2="405" y2="340" class="axis" />
  <line x1="115" y1="340" x2="115" y2="205" class="axis" />
  <line x1="115" y1="295" x2="405" y2="295" class="grid" />
  <line x1="115" y1="250" x2="405" y2="250" class="grid" />
  <polyline points="125,220 190,252 255,276 320,304 390,323" class="curve1" />
  <text x="115" y="366" class="small">近</text>
  <text x="374" y="366" class="small">远</text>
  <text x="310" y="232" class="small">看起来越来越弱</text>

  <path d="M 475 245 L 565 245" class="arrow" />
  <rect x="482" y="274" width="92" height="46" rx="12" class="orange" />
  <text x="496" y="303" class="label">乘 R²</text>

  <rect x="595" y="105" width="390" height="285" rx="16" class="panel" />
  <text x="625" y="145" class="label">距离校正后的初步图层</text>
  <text x="625" y="174" class="small">先抵消几何变暗，再看哪里有结构</text>
  <line x1="645" y1="340" x2="935" y2="340" class="axis" />
  <line x1="645" y1="340" x2="645" y2="205" class="axis" />
  <line x1="645" y1="295" x2="935" y2="295" class="grid" />
  <line x1="645" y1="250" x2="935" y2="250" class="grid" />
  <polyline points="655,300 710,292 765,262 820,225 875,270 925,282" class="curve2" />
  <ellipse cx="818" cy="232" rx="52" ry="30" fill="#ffe0c0" stroke="#d07a26" stroke-width="2" />
  <text x="775" y="215" class="small">可能的颗粒物团</text>
  <text x="645" y="366" class="small">近</text>
  <text x="904" y="366" class="small">远</text>

  <rect x="70" y="430" width="250" height="100" rx="14" class="blue" />
  <text x="95" y="466" class="label">第一眼看形状</text>
  <text x="95" y="496" class="body">哪里亮、哪里暗、哪里有团块</text>

  <rect x="345" y="430" width="250" height="100" rx="14" class="green" />
  <text x="370" y="466" class="label">还不是 PM</text>
  <text x="370" y="496" class="body">它仍然带着传播衰减影响</text>

  <rect x="620" y="430" width="250" height="100" rx="14" class="orange" />
  <text x="645" y="466" class="label">适合做快速预览</text>
  <text x="645" y="496" class="body">值班人员可快速发现异常</text>

  <rect x="895" y="430" width="250" height="100" rx="14" class="red" />
  <text x="920" y="466" class="label">下一步才反演</text>
  <text x="920" y="496" class="body">再去拆出消光和散射</text>

  <rect x="170" y="560" width="860" height="48" rx="14" class="panel" />
  <text x="200" y="591" class="body">记忆句：先把“远处天然更暗”拿掉，才能开始看空气结构。</text>
</svg>
