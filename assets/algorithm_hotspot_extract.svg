<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#55708a" />
    </marker>
    <style>
      .bg { fill:#fbfcff; stroke:#d1dbe8; stroke-width:2; }
      .panel { fill:#ffffff; stroke:#8aa6c4; stroke-width:2; }
      .low { fill:#eaf4ee; stroke:#c5ddcd; stroke-width:2; }
      .mid { fill:#fff4d8; stroke:#e0bc62; stroke-width:2; }
      .high { fill:#f7b2a6; stroke:#c05c50; stroke-width:2; }
      .hot { fill:#ef6f5e; stroke:#9f3328; stroke-width:3; }
      .step { fill:#eef5ff; stroke:#4c84bf; stroke-width:2; }
      .out { fill:#eef8ef; stroke:#5c9b62; stroke-width:2; }
      .arrow { fill:none; stroke:#55708a; stroke-width:4; marker-end:url(#arrow); }
      .title { font:700 28px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .label { font:700 20px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .body { font:17px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#29465d; }
      .small { font:15px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#49657d; }
      .cellText { font:700 17px 'Consolas','Microsoft YaHei','Segoe UI',Arial,sans-serif; fill:#16324f; }
    </style>
  </defs>

  <rect x="20" y="20" width="1160" height="610" rx="20" class="bg" />
  <text x="60" y="70" class="title">算法示意图 7：从 PM 网格里提取热点</text>

  <rect x="65" y="115" width="360" height="360" rx="16" class="panel" />
  <text x="95" y="154" class="label">输入：PM 网格</text>
  <text x="95" y="182" class="small">阈值示例：PM2.5 &gt; 100</text>

  <rect x="105" y="215" width="70" height="58" class="low" /><text x="127" y="251" class="cellText">35</text>
  <rect x="175" y="215" width="70" height="58" class="low" /><text x="197" y="251" class="cellText">42</text>
  <rect x="245" y="215" width="70" height="58" class="low" /><text x="267" y="251" class="cellText">38</text>
  <rect x="315" y="215" width="70" height="58" class="low" /><text x="337" y="251" class="cellText">41</text>

  <rect x="105" y="273" width="70" height="58" class="low" /><text x="127" y="309" class="cellText">45</text>
  <rect x="175" y="273" width="70" height="58" class="hot" /><text x="193" y="309" class="cellText">120</text>
  <rect x="245" y="273" width="70" height="58" class="hot" /><text x="263" y="309" class="cellText">135</text>
  <rect x="315" y="273" width="70" height="58" class="mid" /><text x="337" y="309" class="cellText">80</text>

  <rect x="105" y="331" width="70" height="58" class="low" /><text x="127" y="367" class="cellText">40</text>
  <rect x="175" y="331" width="70" height="58" class="hot" /><text x="193" y="367" class="cellText">118</text>
  <rect x="245" y="331" width="70" height="58" class="hot" /><text x="263" y="367" class="cellText">130</text>
  <rect x="315" y="331" width="70" height="58" class="mid" /><text x="337" y="367" class="cellText">76</text>

  <rect x="105" y="389" width="70" height="58" class="low" /><text x="127" y="425" class="cellText">36</text>
  <rect x="175" y="389" width="70" height="58" class="low" /><text x="197" y="425" class="cellText">48</text>
  <rect x="245" y="389" width="70" height="58" class="low" /><text x="267" y="425" class="cellText">44</text>
  <rect x="315" y="389" width="70" height="58" class="low" /><text x="337" y="425" class="cellText">39</text>

  <path d="M 450 295 L 545 295" class="arrow" />

  <rect x="565" y="125" width="245" height="105" rx="14" class="step" />
  <text x="595" y="165" class="label">1. 阈值筛选</text>
  <text x="595" y="195" class="body">只保留大于 100 的格子</text>

  <rect x="565" y="260" width="245" height="105" rx="14" class="step" />
  <text x="595" y="300" class="label">2. 去掉孤立噪声</text>
  <text x="595" y="330" class="body">单个异常点先谨慎处理</text>

  <rect x="565" y="395" width="245" height="105" rx="14" class="step" />
  <text x="595" y="435" class="label">3. 连通域分析</text>
  <text x="595" y="465" class="body">连在一起的高值算一片</text>

  <path d="M 820 312 L 900 312" class="arrow" />

  <rect x="920" y="190" width="265" height="250" rx="16" class="out" />
  <text x="950" y="232" class="label">输出：热点事件</text>
  <text x="950" y="272" class="body">位置：B2-C3 区域</text>
  <text x="950" y="304" class="body">最大值：135</text>
  <text x="950" y="336" class="body">平均值：126</text>
  <text x="950" y="368" class="body">面积：4 个网格</text>
  <text x="950" y="400" class="body">动作：告警 / 喷雾联动</text>

  <rect x="165" y="540" width="870" height="54" rx="14" class="panel" />
  <text x="195" y="574" class="body">记忆句：热点不是一个点，而是一片连续的高值区域，还要计算位置、强度和持续时间。</text>
</svg>
