<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#56718c" />
    </marker>
    <style>
      .bg { fill:#fbfcff; stroke:#d1dbe8; stroke-width:2; }
      .panel { fill:#ffffff; stroke:#8aa6c4; stroke-width:2; }
      .dry { fill:#eef8ef; stroke:#5c9b62; stroke-width:2; }
      .wet { fill:#edf5ff; stroke:#4c84bf; stroke-width:2; }
      .warn { fill:#fff4e8; stroke:#c98639; stroke-width:2; }
      .out { fill:#fdeef1; stroke:#c05c75; stroke-width:2; }
      .dust { fill:#d6a15f; stroke:#8c5a24; stroke-width:2; }
      .water { fill:#9ed0ff; stroke:#4c84bf; stroke-width:2; opacity:0.75; }
      .arrow { fill:none; stroke:#56718c; stroke-width:4; marker-end:url(#arrow); }
      .title { font:700 28px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .label { font:700 20px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .body { font:17px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#29465d; }
      .small { font:15px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#49657d; }
      .num { font:700 18px 'Consolas','Microsoft YaHei','Segoe UI',Arial,sans-serif; fill:#29465d; }
    </style>
  </defs>

  <rect x="20" y="20" width="1160" height="610" rx="20" class="bg" />
  <text x="60" y="70" class="title">算法示意图 5：湿度会让颗粒物“看起来变胖”</text>

  <rect x="70" y="115" width="300" height="260" rx="16" class="dry" />
  <text x="100" y="155" class="label">低湿度：RH = 40%</text>
  <circle cx="160" cy="245" r="28" class="dust" />
  <circle cx="235" cy="235" r="24" class="dust" />
  <circle cx="275" cy="285" r="30" class="dust" />
  <text x="105" y="335" class="body">颗粒物基本按原本大小散射</text>

  <rect x="430" y="115" width="300" height="260" rx="16" class="wet" />
  <text x="460" y="155" class="label">高湿度：RH = 90%</text>
  <circle cx="520" cy="245" r="42" class="water" />
  <circle cx="520" cy="245" r="26" class="dust" />
  <circle cx="600" cy="235" r="38" class="water" />
  <circle cx="600" cy="235" r="23" class="dust" />
  <circle cx="635" cy="290" r="46" class="water" />
  <circle cx="635" cy="290" r="30" class="dust" />
  <text x="465" y="335" class="body">吸水后散射增强，看起来更亮</text>

  <path d="M 755 245 L 850 245" class="arrow" />
  <rect x="860" y="160" width="285" height="170" rx="16" class="warn" />
  <text x="890" y="202" class="label">不修正会怎样？</text>
  <text x="890" y="240" class="body">可能把“湿了”误判成</text>
  <text x="890" y="268" class="body">“颗粒物质量变多了”</text>
  <text x="890" y="300" class="num">PM 估算偏高</text>

  <rect x="95" y="430" width="1010" height="92" rx="16" class="panel" />
  <text x="125" y="465" class="label">湿度修正做的事</text>
  <text x="125" y="496" class="body">湿态光学量 × 湿度修正系数 → 更接近干颗粒物的光学量</text>

  <rect x="145" y="550" width="245" height="52" rx="12" class="dry" />
  <text x="170" y="583" class="body">40% RH：100 → 约 100</text>
  <rect x="435" y="550" width="245" height="52" rx="12" class="warn" />
  <text x="460" y="583" class="body">70% RH：140 → 约 110</text>
  <rect x="725" y="550" width="245" height="52" rx="12" class="out" />
  <text x="750" y="583" class="body">90% RH：220 → 需谨慎</text>
</svg>
