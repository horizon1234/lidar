<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45d1a" />
    </marker>
    <style>
      .bg { fill:#fbfcfe; stroke:#d3dce6; stroke-width:2; }
      .panel { fill:#ffffff; stroke:#3f78af; stroke-width:2; }
      .accent { fill:#fff3e7; stroke:#d3873a; stroke-width:2; }
      .line { stroke:#34526e; stroke-width:4; }
      .tick { stroke:#34526e; stroke-width:3; }
      .back { stroke:#b45d1a; stroke-width:4; fill:none; marker-end:url(#arrow); }
      .title { font:700 28px 'Segoe UI', Arial, sans-serif; fill:#16324f; }
      .label { font:700 20px 'Segoe UI', Arial, sans-serif; fill:#16324f; }
      .body { font:16px 'Segoe UI', Arial, sans-serif; fill:#2b485f; }
      .small { font:14px 'Segoe UI', Arial, sans-serif; fill:#46637c; }
      .axis { font:15px 'Segoe UI', Arial, sans-serif; fill:#16324f; }
    </style>
  </defs>

  <rect x="20" y="20" width="1160" height="610" rx="24" class="bg" />
  <text x="60" y="70" class="title">Algorithm Picture 3: Why Klett Starts From A Reference Range Rc</text>

  <rect x="70" y="110" width="270" height="160" rx="18" class="panel" />
  <text x="100" y="150" class="label">Inputs</text>
  <text x="100" y="188" class="body">1. cleaned RCS(R)</text>
  <text x="100" y="216" class="body">2. lidar ratio S</text>
  <text x="100" y="244" class="body">3. alpha(Rc) or beta(Rc)</text>

  <rect x="870" y="110" width="260" height="160" rx="18" class="panel" />
  <text x="900" y="150" class="label">Outputs</text>
  <text x="900" y="188" class="body">alpha(R)</text>
  <text x="900" y="216" class="body">beta(R)</text>
  <text x="900" y="244" class="body">extinction profile</text>

  <line x1="120" y1="390" x2="1080" y2="390" class="line" />
  <line x1="140" y1="370" x2="140" y2="410" class="tick" />
  <line x1="280" y1="370" x2="280" y2="410" class="tick" />
  <line x1="420" y1="370" x2="420" y2="410" class="tick" />
  <line x1="560" y1="370" x2="560" y2="410" class="tick" />
  <line x1="700" y1="370" x2="700" y2="410" class="tick" />
  <line x1="840" y1="370" x2="840" y2="410" class="tick" />
  <line x1="1020" y1="360" x2="1020" y2="420" class="tick" />

  <text x="132" y="438" class="axis">near</text>
  <text x="272" y="438" class="axis">30</text>
  <text x="412" y="438" class="axis">60</text>
  <text x="552" y="438" class="axis">90</text>
  <text x="690" y="438" class="axis">120</text>
  <text x="830" y="438" class="axis">150</text>
  <text x="1004" y="438" class="axis">Rc</text>

  <ellipse cx="700" cy="355" rx="38" ry="28" fill="#f8d3b6" stroke="#d3873a" stroke-width="2" />
  <ellipse cx="760" cy="345" rx="48" ry="34" fill="#f0b986" stroke="#d3873a" stroke-width="2" />
  <ellipse cx="820" cy="355" rx="38" ry="28" fill="#f8d3b6" stroke="#d3873a" stroke-width="2" />
  <text x="710" y="300" class="small">dust / plume structure</text>

  <rect x="930" y="315" width="180" height="60" rx="14" class="accent" />
  <text x="952" y="351" class="label">Reference range Rc</text>

  <path d="M 1010 290 C 880 240, 700 220, 520 220 C 410 220, 270 235, 150 260" class="back" />
  <text x="515" y="205" class="label">integrate backward</text>
  <text x="465" y="488" class="body">The far end Rc is chosen first, then the algorithm walks from far to near.</text>

  <rect x="100" y="525" width="1000" height="64" rx="18" class="accent" />
  <text x="130" y="566" class="body">Main intuition: choose a relatively stable reference layer first, otherwise inversion can drift or blow up.</text>
</svg>