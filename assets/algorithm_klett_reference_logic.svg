<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45d1a" />
    </marker>
    <style>
      .bg { fill:#fbfcfe; stroke:#d3dce6; stroke-width:2; }
      .panel { fill:#ffffff; stroke:#3f78af; stroke-width:2; }
      .accent { fill:#fff3e7; stroke:#d3873a; stroke-width:2; }
      .green { fill:#eef8ef; stroke:#5c9b62; stroke-width:2; }
      .line { stroke:#34526e; stroke-width:4; }
      .tick { stroke:#34526e; stroke-width:3; }
      .back { stroke:#b45d1a; stroke-width:4; fill:none; marker-end:url(#arrow); }
      .title { font:700 28px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .label { font:700 20px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .body { font:17px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#2b485f; }
      .small { font:15px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#46637c; }
      .axis { font:16px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
    </style>
  </defs>

  <rect x="20" y="20" width="1160" height="610" rx="20" class="bg" />
  <text x="60" y="70" class="title">算法示意图 4：反推算法为什么要先选一个参考区段</text>

  <rect x="70" y="110" width="285" height="165" rx="16" class="panel" />
  <text x="100" y="150" class="label">输入</text>
  <text x="100" y="188" class="body">1. 预处理后的回波曲线</text>
  <text x="100" y="216" class="body">2. 消光和散射的经验比例</text>
  <text x="100" y="244" class="body">3. 参考区段的可信值</text>

  <rect x="860" y="110" width="285" height="165" rx="16" class="panel" />
  <text x="890" y="150" class="label">输出</text>
  <text x="890" y="188" class="body">消光曲线：光被吃掉多少</text>
  <text x="890" y="216" class="body">散射曲线：光打回来多少</text>
  <text x="890" y="244" class="body">整条路径的光学曲线</text>

  <line x1="120" y1="390" x2="1080" y2="390" class="line" />
  <line x1="140" y1="370" x2="140" y2="410" class="tick" />
  <line x1="280" y1="370" x2="280" y2="410" class="tick" />
  <line x1="420" y1="370" x2="420" y2="410" class="tick" />
  <line x1="560" y1="370" x2="560" y2="410" class="tick" />
  <line x1="700" y1="370" x2="700" y2="410" class="tick" />
  <line x1="840" y1="370" x2="840" y2="410" class="tick" />
  <line x1="1020" y1="360" x2="1020" y2="420" class="tick" />

  <text x="130" y="438" class="axis">近端</text>
  <text x="274" y="438" class="axis">300m</text>
  <text x="414" y="438" class="axis">600m</text>
  <text x="554" y="438" class="axis">900m</text>
  <text x="686" y="438" class="axis">1200m</text>
  <text x="826" y="438" class="axis">1500m</text>
  <text x="985" y="438" class="axis">参考区段</text>

  <ellipse cx="700" cy="355" rx="38" ry="28" fill="#f8d3b6" stroke="#d3873a" stroke-width="2" />
  <ellipse cx="760" cy="345" rx="48" ry="34" fill="#f0b986" stroke="#d3873a" stroke-width="2" />
  <ellipse cx="820" cy="355" rx="38" ry="28" fill="#f8d3b6" stroke="#d3873a" stroke-width="2" />
  <text x="700" y="305" class="small">污染团 / 扬尘结构</text>

  <rect x="930" y="312" width="180" height="64" rx="14" class="accent" />
  <text x="956" y="340" class="label">可信起点</text>
  <text x="952" y="365" class="small">相对干净、稳定</text>

  <path d="M 1010 290 C 880 240, 700 220, 520 220 C 410 220, 270 235, 150 260" class="back" />
  <text x="500" y="205" class="label">从远端往近端一格一格反推</text>

  <rect x="115" y="485" width="410" height="70" rx="14" class="green" />
  <text x="145" y="526" class="body">参考区段选得好，整条曲线更稳。</text>

  <rect x="555" y="485" width="505" height="70" rx="14" class="accent" />
  <text x="585" y="526" class="body">参考区段选进污染团或噪声区，后面结果会整体跑偏。</text>
</svg>
