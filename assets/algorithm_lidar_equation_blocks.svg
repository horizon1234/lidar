<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <style>
      .bg { fill:#fbfcff; stroke:#cdd8e8; stroke-width:2; }
      .formula { fill:#ffffff; stroke:#16324f; stroke-width:2; }
      .box1 { fill:#e9f3ff; stroke:#4c84bf; stroke-width:2; }
      .box2 { fill:#eef8ef; stroke:#5c9b62; stroke-width:2; }
      .box3 { fill:#fff4e8; stroke:#c98639; stroke-width:2; }
      .box4 { fill:#fdeef1; stroke:#c05c75; stroke-width:2; }
      .title { font:700 28px 'Segoe UI', Arial, sans-serif; fill:#16324f; }
      .equation { font:700 28px 'Consolas', 'Segoe UI', Arial, sans-serif; fill:#16324f; }
      .label { font:700 20px 'Segoe UI', Arial, sans-serif; fill:#16324f; }
      .body { font:16px 'Segoe UI', Arial, sans-serif; fill:#2b485f; }
      .small { font:14px 'Segoe UI', Arial, sans-serif; fill:#44627c; }
    </style>
  </defs>

  <rect x="20" y="20" width="1160" height="610" rx="24" class="bg" />
  <text x="60" y="70" class="title">Algorithm Picture 2: Read The Lidar Equation As Four Functional Blocks</text>

  <rect x="65" y="105" width="1070" height="90" rx="18" class="formula" />
  <text x="95" y="160" class="equation">P(R) = [C E] * [O(R) / R^2] * [beta(R)] * [exp(-2 * Int alpha dr)]</text>

  <rect x="65" y="245" width="245" height="220" rx="18" class="box1" />
  <text x="92" y="286" class="label">Block 1: Instrument</text>
  <text x="92" y="323" class="body">C * E</text>
  <text x="92" y="356" class="body">laser pulse energy</text>
  <text x="92" y="384" class="body">optics efficiency</text>
  <text x="92" y="412" class="body">detector gain</text>
  <text x="92" y="448" class="small">If this changes, the whole curve</text>
  <text x="92" y="470" class="small">may move up or down.</text>

  <rect x="335" y="245" width="245" height="220" rx="18" class="box2" />
  <text x="364" y="286" class="label">Block 2: Geometry</text>
  <text x="364" y="323" class="body">O(R) / R^2</text>
  <text x="364" y="356" class="body">near-field overlap</text>
  <text x="364" y="384" class="body">distance spreading</text>
  <text x="364" y="448" class="small">This is why far range is dim and</text>
  <text x="364" y="470" class="small">near range can be biased.</text>

  <rect x="605" y="245" width="245" height="220" rx="18" class="box3" />
  <text x="635" y="286" class="label">Block 3: Scatter Back</text>
  <text x="635" y="323" class="body">beta(R)</text>
  <text x="635" y="356" class="body">how much a layer sends</text>
  <text x="635" y="384" class="body">light back to the lidar</text>
  <text x="635" y="448" class="small">This block is strongly linked to</text>
  <text x="635" y="470" class="small">aerosol or dust presence.</text>

  <rect x="875" y="245" width="245" height="220" rx="18" class="box4" />
  <text x="902" y="286" class="label">Block 4: Transmission</text>
  <text x="902" y="323" class="body">exp(-2 * Int alpha dr)</text>
  <text x="902" y="356" class="body">outgoing loss</text>
  <text x="902" y="384" class="body">incoming loss</text>
  <text x="902" y="448" class="small">A strong distant plume can still</text>
  <text x="902" y="470" class="small">look weak after round-trip loss.</text>

  <rect x="120" y="520" width="960" height="72" rx="18" class="formula" />
  <text x="150" y="565" class="label">Why inversion is hard: beta(R) and alpha(R) are both unknown, but the lidar only measures P(R).</text>
</svg>