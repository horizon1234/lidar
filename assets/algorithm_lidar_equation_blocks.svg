<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <style>
      .bg { fill:#fbfcff; stroke:#cdd8e8; stroke-width:2; }
      .formula { fill:#ffffff; stroke:#16324f; stroke-width:2; }
      .box1 { fill:#e9f3ff; stroke:#4c84bf; stroke-width:2; }
      .box2 { fill:#eef8ef; stroke:#5c9b62; stroke-width:2; }
      .box3 { fill:#fff4e8; stroke:#c98639; stroke-width:2; }
      .box4 { fill:#fdeef1; stroke:#c05c75; stroke-width:2; }
      .hint { fill:#f7f9fc; stroke:#bfd0e2; stroke-width:2; }
      .title { font:700 28px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .equation { font:700 26px 'Consolas','Microsoft YaHei','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .plain { font:700 23px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .label { font:700 20px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .body { font:17px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#2b485f; }
      .small { font:15px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#44627c; }
      .arrow { fill:none; stroke:#7890a6; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
      .equals { font:700 28px 'Segoe UI',Arial,sans-serif; fill:#55708a; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7890a6" />
    </marker>
  </defs>

  <rect x="20" y="20" width="1160" height="610" rx="20" class="bg" />
  <text x="60" y="70" class="title">算法示意图 2：把 LiDAR 方程先拆成 4 个功能块</text>

  <rect x="65" y="100" width="1070" height="92" rx="16" class="formula" />
  <text x="95" y="137" class="equation">P(R) = [C·E] × [O(R)/R²] × [β(R)] × [exp(-2∫α(r)dr)]</text>
  <text x="95" y="170" class="plain">测到的回波 = 仪器刻度 × 距离/重叠 × 这一层打回来多少 × 路上被吃掉多少</text>

  <rect x="65" y="245" width="245" height="230" rx="14" class="box1" />
  <text x="92" y="286" class="label">1. 仪器给的刻度</text>
  <text x="92" y="323" class="body">C · E</text>
  <text x="92" y="356" class="body">激光脉冲能量</text>
  <text x="92" y="384" class="body">光学接收效率</text>
  <text x="92" y="412" class="body">探测器增益</text>
  <text x="92" y="448" class="small">它变了，整条曲线会一起</text>
  <text x="92" y="470" class="small">抬高或压低。</text>

  <rect x="335" y="245" width="245" height="230" rx="14" class="box2" />
  <text x="364" y="286" class="label">2. 距离和重叠修正</text>
  <text x="364" y="323" class="body">O(R) / R²</text>
  <text x="364" y="356" class="body">远处天然更暗</text>
  <text x="364" y="384" class="body">近处可能没完全重叠</text>
  <text x="364" y="448" class="small">所以原始回波不能直接当成</text>
  <text x="364" y="470" class="small">污染浓度。</text>

  <rect x="605" y="245" width="245" height="230" rx="14" class="box3" />
  <text x="635" y="286" class="label">3. 这一层打回来多少</text>
  <text x="635" y="323" class="body">β(R)</text>
  <text x="635" y="356" class="body">后向散射能力</text>
  <text x="635" y="384" class="body">和颗粒物数量、粒径有关</text>
  <text x="635" y="448" class="small">这是最像“颗粒物存在感”</text>
  <text x="635" y="470" class="small">的一块。</text>

  <rect x="875" y="245" width="245" height="230" rx="14" class="box4" />
  <text x="902" y="286" class="label">4. 路上被吃掉多少</text>
  <text x="902" y="323" class="body">exp(-2∫α(r)dr)</text>
  <text x="902" y="356" class="body">去程衰减一次</text>
  <text x="902" y="384" class="body">回程又衰减一次</text>
  <text x="902" y="448" class="small">远处污染团可能很强，回到</text>
  <text x="902" y="470" class="small">仪器时已经被削弱很多。</text>

  <path d="M 188 196 L 188 236" class="arrow" marker-end="url(#arrowHead)" />
  <path d="M 458 196 L 458 236" class="arrow" marker-end="url(#arrowHead)" />
  <path d="M 728 196 L 728 236" class="arrow" marker-end="url(#arrowHead)" />
  <path d="M 998 196 L 998 236" class="arrow" marker-end="url(#arrowHead)" />

  <rect x="105" y="520" width="990" height="74" rx="16" class="hint" />
  <text x="135" y="551" class="label">反演为什么难？</text>
  <text x="135" y="578" class="body">仪器只测到一个 P(R)，但 β(R)“打回来多少”和 α(R)“路上吃掉多少”都未知，而且两者会互相影响。</text>
</svg>
