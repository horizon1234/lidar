<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4d7d55" />
    </marker>
    <style>
      .bg { fill:#fbfdfb; stroke:#d6e4d6; stroke-width:2; }
      .box1 { fill:#edf5ff; stroke:#4c84bf; stroke-width:2; }
      .box2 { fill:#eef8ef; stroke:#5f9d65; stroke-width:2; }
      .box3 { fill:#fff5e8; stroke:#d18c44; stroke-width:2; }
      .box4 { fill:#ffffff; stroke:#3b5b78; stroke-width:2; }
      .accent { fill:#f0faf0; stroke:#5f9d65; stroke-width:2; }
      .title { font:700 28px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .label { font:700 20px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#16324f; }
      .body { font:17px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#29465d; }
      .small { font:15px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif; fill:#49657d; }
      .arrow { stroke:#4d7d55; stroke-width:4; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect x="20" y="20" width="1160" height="580" rx="20" class="bg" />
  <text x="60" y="70" class="title">算法示意图 6：光学量要经过本地标定，才能变成 PM</text>

  <rect x="70" y="150" width="250" height="160" rx="16" class="box1" />
  <text x="100" y="190" class="label">LiDAR 光学反演</text>
  <text x="100" y="228" class="body">消光 α(R)</text>
  <text x="100" y="256" class="body">后向散射 β(R)</text>
  <text x="100" y="284" class="body">光学强度图层</text>

  <rect x="70" y="365" width="250" height="150" rx="16" class="box2" />
  <text x="100" y="405" class="label">气象输入</text>
  <text x="100" y="443" class="body">湿度 RH</text>
  <text x="100" y="471" class="body">温度</text>
  <text x="100" y="499" class="body">风速 / 风向</text>

  <rect x="395" y="365" width="250" height="150" rx="16" class="box3" />
  <text x="425" y="405" class="label">地面参考站</text>
  <text x="425" y="443" class="body">PM2.5 实测值</text>
  <text x="425" y="471" class="body">PM10 实测值</text>
  <text x="425" y="499" class="body">训练时的标准答案</text>

  <rect x="395" y="150" width="350" height="160" rx="18" class="box4" />
  <text x="430" y="192" class="label">本地标定模型</text>
  <text x="430" y="230" class="body">线性模型 / 随机森林 / GBDT</text>
  <text x="430" y="258" class="body">光学量 + 湿度 + 气象 + 参考站</text>
  <text x="430" y="286" class="small">关键点：光学量不是质量浓度，</text>
  <text x="430" y="308" class="small">必须结合本地样本学习换算关系。</text>

  <rect x="825" y="200" width="290" height="190" rx="18" class="accent" />
  <text x="860" y="243" class="label">业务输出</text>
  <text x="860" y="281" class="body">PM2.5 / PM10 地图</text>
  <text x="860" y="309" class="body">热点区域</text>
  <text x="860" y="337" class="body">污染事件记录</text>
  <text x="860" y="365" class="body">喷雾联动目标点</text>

  <line x1="320" y1="230" x2="395" y2="230" class="arrow" />
  <line x1="320" y1="430" x2="395" y2="270" class="arrow" />
  <line x1="645" y1="365" x2="600" y2="310" class="arrow" />
  <line x1="745" y1="270" x2="825" y2="270" class="arrow" />

  <rect x="130" y="86" width="940" height="44" rx="14" class="box4" />
  <text x="165" y="114" class="body">记忆句：LiDAR 先测到光学反应，PM 质量浓度要靠本地标定和气象修正。</text>
</svg>
