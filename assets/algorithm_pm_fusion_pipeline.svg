<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4d7d55" />
    </marker>
    <style>
      .bg { fill:#fbfdfb; stroke:#d6e4d6; stroke-width:2; }
      .box1 { fill:#edf5ff; stroke:#4c84bf; stroke-width:2; }
      .box2 { fill:#eef8ef; stroke:#5f9d65; stroke-width:2; }
      .box3 { fill:#fff5e8; stroke:#d18c44; stroke-width:2; }
      .box4 { fill:#ffffff; stroke:#3b5b78; stroke-width:2; }
      .accent { fill:#f0faf0; stroke:#5f9d65; stroke-width:2; }
      .title { font:700 28px 'Segoe UI', Arial, sans-serif; fill:#16324f; }
      .label { font:700 20px 'Segoe UI', Arial, sans-serif; fill:#16324f; }
      .body { font:16px 'Segoe UI', Arial, sans-serif; fill:#29465d; }
      .small { font:14px 'Segoe UI', Arial, sans-serif; fill:#49657d; }
      .arrow { stroke:#4d7d55; stroke-width:4; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect x="20" y="20" width="1160" height="580" rx="24" class="bg" />
  <text x="60" y="70" class="title">Algorithm Picture 4: Optical Quantities Become PM Only After Local Calibration</text>

  <rect x="70" y="150" width="250" height="160" rx="18" class="box1" />
  <text x="100" y="190" class="label">Optical Inversion</text>
  <text x="100" y="228" class="body">alpha(R)</text>
  <text x="100" y="256" class="body">beta(R)</text>
  <text x="100" y="284" class="body">extinction profile</text>

  <rect x="70" y="365" width="250" height="150" rx="18" class="box2" />
  <text x="100" y="405" class="label">Weather Inputs</text>
  <text x="100" y="443" class="body">RH</text>
  <text x="100" y="471" class="body">temperature</text>
  <text x="100" y="499" class="body">wind</text>

  <rect x="395" y="365" width="250" height="150" rx="18" class="box3" />
  <text x="425" y="405" class="label">Ground Reference</text>
  <text x="425" y="443" class="body">PM2.5 station</text>
  <text x="425" y="471" class="body">PM10 station</text>
  <text x="425" y="499" class="body">training targets</text>

  <rect x="395" y="150" width="350" height="160" rx="20" class="box4" />
  <text x="430" y="192" class="label">Local Calibration Model</text>
  <text x="430" y="230" class="body">linear model / RF / GBDT</text>
  <text x="430" y="258" class="body">optics + humidity + weather + reference</text>
  <text x="430" y="286" class="small">Important note: optics is not mass until</text>
  <text x="430" y="308" class="small">the site-specific calibration is learned.</text>

  <rect x="825" y="200" width="290" height="190" rx="20" class="accent" />
  <text x="860" y="243" class="label">Business Outputs</text>
  <text x="860" y="281" class="body">PM2.5 / PM10 map</text>
  <text x="860" y="309" class="body">hotspot region</text>
  <text x="860" y="337" class="body">event record</text>
  <text x="860" y="365" class="body">spray target point</text>

  <line x1="320" y1="230" x2="395" y2="230" class="arrow" />
  <line x1="320" y1="430" x2="395" y2="270" class="arrow" />
  <line x1="645" y1="365" x2="600" y2="310" class="arrow" />
  <line x1="745" y1="270" x2="825" y2="270" class="arrow" />

  <rect x="130" y="85" width="940" height="42" rx="14" class="box4" />
  <text x="165" y="112" class="body">Important intuition: the lidar measures optical response first. PM mass needs local calibration and meteorology.</text>
</svg>