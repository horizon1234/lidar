<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#46637f"/></marker>
    <style>
      .bg{fill:#fbfcff;stroke:#cdd8e8;stroke-width:2}.panel{fill:#fff;stroke:#9bb4cc;stroke-width:2}.formula{fill:#eef5ff;stroke:#4c84bf;stroke-width:2}.result{fill:#eef8ef;stroke:#5c9b62;stroke-width:2}.axis{stroke:#46637f;stroke-width:3;marker-end:url(#arrow)}.beam{stroke:#f08a37;stroke-width:6;stroke-linecap:round}.dash{stroke:#8aa6c4;stroke-width:2;stroke-dasharray:8 7}.point{fill:#e55245;stroke:#8c2a22;stroke-width:3}.lidar{fill:#246b8f;stroke:#143d52;stroke-width:3}.title{font:700 30px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#16324f}.label{font:700 22px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#16324f}.body{font:18px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#29465d}.small{font:16px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#49657d}.mono{font:700 20px Consolas,'Microsoft YaHei',monospace;fill:#16324f}
    </style>
  </defs>
  <rect x="20" y="20" width="1160" height="610" rx="22" class="bg"/>
  <text x="60" y="72" class="title">第 13 章示意图 3：把 40°、10°、120 m 算成一个空间点</text>
  <rect x="60" y="110" width="520" height="430" rx="18" class="panel"/>
  <line x1="120" y1="455" x2="520" y2="455" class="axis"/>
  <line x1="120" y1="455" x2="120" y2="155" class="axis"/>
  <circle cx="120" cy="455" r="22" class="lidar"/>
  <path d="M120 455 L455 255" class="beam"/>
  <circle cx="455" cy="255" r="17" class="point"/>
  <line x1="455" y1="255" x2="455" y2="455" class="dash"/>
  <line x1="120" y1="455" x2="455" y2="455" class="dash"/>
  <text x="210" y="340" class="label">R = 120 m</text>
  <text x="275" y="480" class="small">水平投影 = 118.2 m</text>
  <text x="468" y="360" class="small">z = 20.8 m</text>
  <text x="385" y="235" class="label">PM2.5=82</text>
  <path d="M120 455 A70 70 0 0 1 181 421" fill="none" stroke="#5c9b62" stroke-width="4"/>
  <text x="188" y="423" class="small">10° 仰角</text>
  <rect x="630" y="115" width="500" height="90" rx="16" class="formula"/>
  <text x="660" y="150" class="label">第一步：先拆斜距</text>
  <text x="660" y="183" class="mono">horizontal = 120 * cos(10°) = 118.2 m</text>
  <rect x="630" y="230" width="500" height="120" rx="16" class="formula"/>
  <text x="660" y="265" class="label">第二步：再拆东向和北向</text>
  <text x="660" y="300" class="mono">x = 118.2 * sin(40°) = 76.0 m</text>
  <text x="660" y="330" class="mono">y = 118.2 * cos(40°) = 90.5 m</text>
  <rect x="630" y="375" width="500" height="120" rx="16" class="result"/>
  <text x="660" y="415" class="label">结果</text>
  <text x="660" y="453" class="mono">ENU = (76.0, 90.5, 20.8) m</text>
  <text x="660" y="482" class="body">东 76 m，北 90.5 m，相对雷达高 20.8 m</text>
  <rect x="120" y="585" width="960" height="42" rx="13" fill="#fff4e8" stroke="#c98639" stroke-width="2"/>
  <text x="155" y="612" class="body">记忆句：先把斜线压到地面，再把地面距离拆成东向和北向。</text>
</svg>
