<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#46637f"/></marker>
    <style>
      .bg{fill:#fbfcff;stroke:#cdd8e8;stroke-width:2}.panel{fill:#fff;stroke:#9bb4cc;stroke-width:2}.grid{fill:none;stroke:#c9d7e5;stroke-width:2}.cell{fill:#eef5ff;stroke:#c9d7e5;stroke-width:2}.hotcell{fill:#f7b2a6;stroke:#c05c50;stroke-width:3}.point{fill:#e55245;stroke:#8c2a22;stroke-width:2}.arrow{stroke:#46637f;stroke-width:4;fill:none;marker-end:url(#arrow)}.title{font:700 30px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#16324f}.label{font:700 22px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#16324f}.body{font:18px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#29465d}.small{font:16px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#49657d}.mono{font:700 18px Consolas,'Microsoft YaHei',monospace;fill:#16324f}
    </style>
  </defs>
  <rect x="20" y="20" width="1160" height="610" rx="22" class="bg"/>
  <text x="60" y="72" class="title">第 13 章示意图 6：网格化就是把散点整理成平台能用的空间产品</text>
  <rect x="60" y="115" width="430" height="420" rx="18" class="panel"/>
  <text x="95" y="158" class="label">转换后：很多离散点</text>
  <circle cx="160" cy="250" r="8" class="point"/><circle cx="210" cy="280" r="8" class="point"/><circle cx="245" cy="235" r="8" class="point"/><circle cx="290" cy="300" r="8" class="point"/><circle cx="330" cy="260" r="8" class="point"/><circle cx="265" cy="365" r="8" class="point"/><circle cx="370" cy="345" r="8" class="point"/><circle cx="185" cy="380" r="8" class="point"/>
  <text x="95" y="500" class="body">每个点都有 x,y,z 和 PM 值，</text><text x="95" y="528" class="body">但不一定排得整齐。</text>
  <path d="M515 315 L640 315" class="arrow"/>
  <rect x="680" y="115" width="460" height="420" rx="18" class="panel"/>
  <text x="715" y="158" class="label">网格化后：每个格子一个统计值</text>
  <g transform="translate(735,205)">
    <rect x="0" y="0" width="70" height="62" class="cell"/><rect x="70" y="0" width="70" height="62" class="cell"/><rect x="140" y="0" width="70" height="62" class="cell"/><rect x="210" y="0" width="70" height="62" class="cell"/>
    <rect x="0" y="62" width="70" height="62" class="cell"/><rect x="70" y="62" width="70" height="62" class="hotcell"/><rect x="140" y="62" width="70" height="62" class="hotcell"/><rect x="210" y="62" width="70" height="62" class="cell"/>
    <rect x="0" y="124" width="70" height="62" class="cell"/><rect x="70" y="124" width="70" height="62" class="hotcell"/><rect x="140" y="124" width="70" height="62" class="hotcell"/><rect x="210" y="124" width="70" height="62" class="cell"/>
    <rect x="0" y="186" width="70" height="62" class="cell"/><rect x="70" y="186" width="70" height="62" class="cell"/><rect x="140" y="186" width="70" height="62" class="cell"/><rect x="210" y="186" width="70" height="62" class="cell"/>
    <text x="87" y="100" class="mono">120</text><text x="157" y="100" class="mono">135</text><text x="87" y="162" class="mono">118</text><text x="157" y="162" class="mono">130</text>
  </g>
  <text x="715" y="500" class="body">可以做平均值、最大值、命中次数、</text><text x="715" y="528" class="body">连通域和热点质心。</text>
  <rect x="140" y="585" width="920" height="42" rx="13" fill="#eef8ef" stroke="#5c9b62" stroke-width="2"/>
  <text x="175" y="612" class="body">记忆句：点云适合分析，网格适合显示、告警、统计和回放。</text>
</svg>
