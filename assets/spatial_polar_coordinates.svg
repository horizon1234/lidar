<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#46637f" />
    </marker>
    <style>
      .bg{fill:#fbfcff;stroke:#cdd8e8;stroke-width:2}.panel{fill:#fff;stroke:#9bb4cc;stroke-width:2}.beam{fill:none;stroke:#f08a37;stroke-width:6;stroke-linecap:round}.beam2{fill:none;stroke:#f08a37;stroke-width:3;stroke-dasharray:9 8}.axis{stroke:#46637f;stroke-width:3;marker-end:url(#arrow)}.thin{stroke:#7890a6;stroke-width:2}.point{fill:#e55245;stroke:#8c2a22;stroke-width:3}.lidar{fill:#246b8f;stroke:#143d52;stroke-width:3}.tag{fill:#eef5ff;stroke:#4c84bf;stroke-width:2}.title{font:700 30px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#16324f}.label{font:700 21px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#16324f}.body{font:18px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#29465d}.small{font:16px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#49657d}.mono{font:700 18px Consolas,'Microsoft YaHei',monospace;fill:#16324f}
    </style>
  </defs>
  <rect x="20" y="20" width="1160" height="610" rx="22" class="bg"/>
  <text x="60" y="72" class="title">第 13 章示意图 1：LiDAR 先看到的是极坐标</text>
  <rect x="60" y="105" width="705" height="470" rx="18" class="panel"/>
  <line x1="190" y1="500" x2="640" y2="500" class="axis"/>
  <line x1="190" y1="500" x2="190" y2="135" class="axis"/>
  <text x="650" y="507" class="label">水平地面</text>
  <text x="160" y="132" class="label">高度</text>
  <circle cx="190" cy="500" r="24" class="lidar"/>
  <text x="132" y="545" class="label">LiDAR</text>
  <path d="M 190 500 L 575 245" class="beam"/>
  <path d="M 190 500 L 575 245" class="beam2"/>
  <circle cx="575" cy="245" r="18" class="point"/>
  <path d="M 190 500 A 88 88 0 0 1 265 453" fill="none" stroke="#5c9b62" stroke-width="4"/>
  <text x="270" y="455" class="label">仰角 elevation</text>
  <line x1="190" y1="500" x2="575" y2="500" stroke="#b5c4d3" stroke-width="2" stroke-dasharray="7 7"/>
  <line x1="575" y1="245" x2="575" y2="500" stroke="#b5c4d3" stroke-width="2" stroke-dasharray="7 7"/>
  <text x="360" y="356" class="label">距离 R</text>
  <text x="590" y="250" class="label">一个 range bin</text>
  <text x="590" y="280" class="small">这里挂着 PM / 消光结果</text>
  <rect x="815" y="125" width="320" height="95" rx="16" class="tag"/>
  <text x="845" y="162" class="label">距离 R</text>
  <text x="845" y="194" class="body">回波晚回来多少</text>
  <rect x="815" y="250" width="320" height="95" rx="16" class="tag"/>
  <text x="845" y="287" class="label">方位角 azimuth</text>
  <text x="845" y="319" class="body">水平方向朝哪边</text>
  <rect x="815" y="375" width="320" height="95" rx="16" class="tag"/>
  <text x="845" y="412" class="label">仰角 elevation</text>
  <text x="845" y="444" class="body">光束往上抬多少</text>
  <rect x="130" y="590" width="940" height="42" rx="13" fill="#eef8ef" stroke="#5c9b62" stroke-width="2"/>
  <text x="165" y="617" class="body">记忆句：极坐标就是“朝哪个方向打、抬多高、沿这条线走多远”。</text>
</svg>
