<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#46637f"/></marker>
    <style>
      .bg{fill:#fbfcff;stroke:#cdd8e8;stroke-width:2}.panel{fill:#fff;stroke:#9bb4cc;stroke-width:2}.sector{fill:#eaf4ff;stroke:#4c84bf;stroke-width:2;opacity:.78}.slice{fill:#fff3e0;stroke:#c98639;stroke-width:2;opacity:.85}.ray{stroke:#4c84bf;stroke-width:3}.ray2{stroke:#c98639;stroke-width:3}.hot{fill:#ef6f5e;stroke:#9f3328;stroke-width:3}.lidar{fill:#246b8f;stroke:#143d52;stroke-width:3}.axis{stroke:#46637f;stroke-width:3;marker-end:url(#arrow)}.title{font:700 30px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#16324f}.label{font:700 22px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#16324f}.body{font:18px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#29465d}.small{font:16px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#49657d}
    </style>
  </defs>
  <rect x="20" y="20" width="1160" height="610" rx="22" class="bg"/>
  <text x="60" y="72" class="title">第 13 章示意图 4：PPI 看平面位置，RHI 看垂直高度</text>
  <rect x="60" y="115" width="520" height="455" rx="18" class="panel"/>
  <text x="95" y="158" class="label">PPI：固定仰角，水平扫一圈</text>
  <g transform="translate(315,345)">
    <path d="M0 0 L-185 -150 A240 240 0 0 1 185 -150 Z" class="sector"/>
    <line x1="0" y1="0" x2="0" y2="-235" class="ray"/>
    <line x1="0" y1="0" x2="-95" y2="-215" class="ray"/>
    <line x1="0" y1="0" x2="95" y2="-215" class="ray"/>
    <circle cx="0" cy="0" r="22" class="lidar"/>
    <circle cx="72" cy="-170" r="18" class="hot"/>
    <text x="-18" y="45" class="label">LiDAR</text>
    <text x="-12" y="-250" class="label">北</text>
    <text x="112" y="-173" class="body">平面热点</text>
  </g>
  <text x="95" y="520" class="body">适合回答：哪个方向、离设备多远有污染？</text>
  <rect x="620" y="115" width="520" height="455" rx="18" class="panel"/>
  <text x="655" y="158" class="label">RHI：固定方位，上下扫仰角</text>
  <g transform="translate(710,500)">
    <line x1="0" y1="0" x2="365" y2="0" class="axis"/>
    <line x1="0" y1="0" x2="0" y2="-315" class="axis"/>
    <path d="M0 0 L340 -65 L340 -235 L0 0" class="slice"/>
    <line x1="0" y1="0" x2="345" y2="-70" class="ray2"/>
    <line x1="0" y1="0" x2="330" y2="-150" class="ray2"/>
    <line x1="0" y1="0" x2="300" y2="-230" class="ray2"/>
    <circle cx="0" cy="0" r="22" class="lidar"/>
    <circle cx="250" cy="-145" r="18" class="hot"/>
    <text x="375" y="8" class="label">地面距离</text>
    <text x="10" y="-315" class="label">高度</text>
    <text x="270" y="-145" class="body">抬升羽流</text>
  </g>
  <text x="655" y="548" class="body">适合回答：粉尘抬到多高、层顶层底在哪里？</text>
</svg>
