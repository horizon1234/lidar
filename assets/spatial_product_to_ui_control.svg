<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#46637f"/></marker>
    <style>
      .bg{fill:#fbfcff;stroke:#cdd8e8;stroke-width:2}.box{fill:#fff;stroke:#9bb4cc;stroke-width:2}.alg{fill:#eef5ff;stroke:#4c84bf;stroke-width:2}.space{fill:#eef8ef;stroke:#5c9b62;stroke-width:2}.ui{fill:#fff4e8;stroke:#c98639;stroke-width:2}.ctrl{fill:#fdeef1;stroke:#c05c75;stroke-width:2}.arrow{stroke:#46637f;stroke-width:4;fill:none;marker-end:url(#arrow)}.title{font:700 30px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#16324f}.label{font:700 21px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#16324f}.body{font:18px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#29465d}.small{font:16px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#49657d}.mono{font:700 17px Consolas,'Microsoft YaHei',monospace;fill:#16324f}
    </style>
  </defs>
  <rect x="20" y="20" width="1160" height="610" rx="22" class="bg"/>
  <text x="60" y="72" class="title">第 13 章示意图 7：空间定位之后，数据才能进入 UI、告警和联动</text>
  <rect x="70" y="140" width="210" height="110" rx="16" class="alg"/>
  <text x="100" y="178" class="label">算法产品</text><text x="100" y="212" class="body">PM / 消光 / 热点</text><text x="100" y="238" class="small">还只是数组和距离格子</text>
  <path d="M280 195 L360 195" class="arrow"/>
  <rect x="370" y="140" width="220" height="110" rx="16" class="space"/>
  <text x="400" y="178" class="label">空间定位</text><text x="400" y="212" class="body">极坐标 -> ENU</text><text x="400" y="238" class="small">知道真实位置</text>
  <path d="M590 195 L670 195" class="arrow"/>
  <rect x="680" y="140" width="220" height="110" rx="16" class="space"/>
  <text x="710" y="178" class="label">网格 / 事件</text><text x="710" y="212" class="body">体素、质心、区域</text><text x="710" y="238" class="small">变成平台对象</text>
  <path d="M790 250 L790 315" class="arrow"/>
  <rect x="105" y="345" width="245" height="130" rx="16" class="ui"/>
  <text x="135" y="386" class="label">UI 图层</text><text x="135" y="422" class="body">地图、PPI、RHI、3D</text><text x="135" y="452" class="small">值班人员看得懂</text>
  <rect x="475" y="345" width="245" height="130" rx="16" class="ui"/>
  <text x="505" y="386" class="label">告警事件</text><text x="505" y="422" class="body">位置、强度、置信度</text><text x="505" y="452" class="small">系统能记录和追踪</text>
  <rect x="845" y="345" width="245" height="130" rx="16" class="ctrl"/>
  <text x="875" y="386" class="label">喷雾联动</text><text x="875" y="422" class="body">方位角、俯仰角</text><text x="875" y="452" class="small">设备能执行动作</text>
  <path d="M680 405 L355 405" class="arrow"/>
  <path d="M790 405 L725 405" class="arrow"/>
  <path d="M900 405 L840 405" class="arrow"/>
  <rect x="150" y="545" width="900" height="54" rx="14" fill="#fff" stroke="#9bb4cc" stroke-width="2"/>
  <text x="185" y="579" class="body">记忆句：空间定位是桥梁。没有它，算法结果只能看；有了它，系统才能定位、告警、控制和评估。</text>
</svg>
