<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#46637f"/></marker>
    <style>
      .bg{fill:#fbfcff;stroke:#cdd8e8;stroke-width:2}.box{fill:#fff;stroke:#9bb4cc;stroke-width:2}.step{fill:#eef5ff;stroke:#4c84bf;stroke-width:2}.warn{fill:#fff4e8;stroke:#c98639;stroke-width:2}.arrow{stroke:#46637f;stroke-width:4;fill:none;marker-end:url(#arrow)}.car{fill:#dcebf7;stroke:#246b8f;stroke-width:3}.lidar{fill:#246b8f;stroke:#143d52;stroke-width:3}.beam{stroke:#f08a37;stroke-width:5;stroke-linecap:round}.point{fill:#e55245;stroke:#8c2a22;stroke-width:3}.title{font:700 30px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#16324f}.label{font:700 21px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#16324f}.body{font:18px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#29465d}.small{font:16px 'Microsoft YaHei','PingFang SC','Segoe UI',Arial,sans-serif;fill:#49657d}
    </style>
  </defs>
  <rect x="20" y="20" width="1160" height="610" rx="22" class="bg"/>
  <text x="60" y="72" class="title">第 13 章示意图 5：车载 LiDAR 要一层层把点搬到地图上</text>
  <rect x="60" y="115" width="430" height="420" rx="18" class="box"/>
  <path d="M105 400 L345 400 Q380 400 390 370 L410 310 L120 310 L95 370 Q85 400 105 400 Z" class="car"/>
  <circle cx="155" cy="405" r="28" fill="#32485a"/><circle cx="345" cy="405" r="28" fill="#32485a"/>
  <rect x="235" y="255" width="75" height="55" rx="10" class="lidar"/>
  <path d="M272 255 L380 185" class="beam"/>
  <circle cx="380" cy="185" r="16" class="point"/>
  <text x="112" y="465" class="body">车辆在移动，车体会横滚、俯仰、改变航向</text>
  <text x="325" y="180" class="label">粉尘点</text>
  <rect x="530" y="105" width="250" height="76" rx="14" class="step"/>
  <text x="560" y="137" class="label">1 雷达本体点</text><text x="560" y="164" class="small">距离 + 方位 + 仰角</text>
  <rect x="530" y="215" width="250" height="76" rx="14" class="step"/>
  <text x="560" y="247" class="label">2 扫描头角度</text><text x="560" y="274" class="small">云台或扫描镜姿态</text>
  <rect x="530" y="325" width="250" height="76" rx="14" class="step"/>
  <text x="560" y="357" class="label">3 安装偏置</text><text x="560" y="384" class="small">雷达在车顶哪个位置</text>
  <rect x="860" y="105" width="250" height="76" rx="14" class="step"/>
  <text x="890" y="137" class="label">4 车体姿态</text><text x="890" y="164" class="small">roll / pitch / yaw</text>
  <rect x="860" y="215" width="250" height="76" rx="14" class="step"/>
  <text x="890" y="247" class="label">5 GPS / RTK</text><text x="890" y="274" class="small">这一刻车在哪里</text>
  <rect x="860" y="325" width="250" height="76" rx="14" class="step"/>
  <text x="890" y="357" class="label">6 地图坐标</text><text x="890" y="384" class="small">能叠到底图和轨迹上</text>
  <path d="M655 181 L655 213" class="arrow"/><path d="M655 291 L655 323" class="arrow"/><path d="M780 363 C815 363 825 143 858 143" class="arrow"/><path d="M985 181 L985 213" class="arrow"/><path d="M985 291 L985 323" class="arrow"/>
  <rect x="545" y="465" width="545" height="95" rx="16" class="warn"/>
  <text x="580" y="505" class="label">最容易出错：时间没对齐</text>
  <text x="580" y="538" class="body">车速 10 m/s 时，时间差 0.5 秒，位置就可能错 5 m。</text>
</svg>
